name: inkwell_notes
description: "A premium, editorial-style, offline-first note-taking app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  intl: ^0.20.2
  path_provider: ^2.1.5
  riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.3
  hive_ce_generator: ^1.11.0

flutter:
  uses-material-design: true
